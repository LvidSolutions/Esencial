name: CMS production build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - name: Build published CMS content
        run: pnpm run build:cms
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_PROJECT_ID: g6xm8j7l
          SANITY_DATASET: production
      - name: Commit generated website
        run: |
          git config user.name "Esencial CMS build"
          git config user.email "cms-build@users.noreply.github.com"
          git add public
          git diff --cached --quiet || git commit -m "Build website from published Sanity content"
          git push
